name: ✨ 기능 제안
description: 새로운 기능이나 개선 아이디어
title: "[Feat] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: 영역
      options:
        - app (Flutter)
        - server (Node/TS)
        - 공통 / API 계약
        - 디자인 / UI
        - 기타
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 배경 / 문제
      description: 어떤 문제를 해결하나요? 왜 필요한가요?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 동작/화면/API를 구체적으로 적어주세요.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안 / 참고
      description: 고려한 다른 방법, 참고 자료, Figma 링크 등
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: API 변경이 필요하면 서버(계약)와 앱 모델을 함께 갱신해야 함을 이해했습니다.
          required: false
        - label: 트래픽 스파이크에 영향을 줄 수 있는 변경입니다 (캐싱/페이지네이션 등 검토 필요).
          required: false
