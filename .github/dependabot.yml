version: 2
updates:
  # GitHub Actions 워크플로 액션 핀 업데이트
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci # commitlint type-enum 통과(ci)

  # server (Node/TS) — package-lock.json 존재
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: build # 의존성 = build type

  # app (Flutter) — pubspec.lock 존재
  - package-ecosystem: pub
    directory: /app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
