name: 문서·컨벤션 검사

# 코드가 아닌 "사람이 읽는" 산출물 검사 묶음.
# 워크플로 1개 아래 하위 잡(pr-title / commitlint / docs-links)으로 구성한다.
# (코드 검사 — flutter analyze, tsc, test 등 — 은 app/server 스캐폴딩 시 별도 워크플로로)
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: docs-conventions-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR 제목 (type + (#이슈번호))
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        # Dependabot PR은 제목 끝 (#이슈번호)가 없으므로 검증 스텝만 건너뛴다.
        # (잡 자체는 통과로 끝나 required check 가 pending 으로 묶이지 않음)
        if: github.actor != 'dependabot[bot]'
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          # 제목 끝에 (#이슈번호) 강제
          subjectPattern: '.+\(#\d+\)\s*$'
          subjectPatternError: 'PR 제목 끝에 (#이슈번호)를 붙여주세요. 예) feat(app): 세트 기록 화면 추가 (#12)'

  commitlint:
    name: 커밋 메시지 (Angular + #이슈)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run commitlint
        # Dependabot 커밋은 Angular 컨벤션/이슈참조를 따르지 않으므로 검증 스텝만 건너뛴다.
        if: github.actor != 'dependabot[bot]'
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs
          failOnWarnings: true
          helpURL: https://github.com/GDG-jnu-DietSetlog/diet-setlog/blob/main/CONTRIBUTING.md

  docs-links:
    name: 문서 링크 체크
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check relative links in Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          # --offline: 외부 URL은 건너뛰고 문서 간 상대경로 링크 깨짐만 검사
          args: "--offline --no-progress './**/*.md'"
          fail: true
