name: CI

# 코드 검사 묶음 (ADR 0001 묶음 2·3).
# - 비코드 검사(PR 제목/commitlint/문서 링크)는 docs-and-conventions.yml 에 있음.
# - paths-filter 로 변경된 영역(server/app)의 잡만 실행.
# - required status check 함정 회피: 항상 도는 집계 잡(ci-gate) 하나만 브랜치 보호의
#   required check 로 등록한다. 스킵된 잡은 직접 required 로 걸지 않는다.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: 변경 경로 감지
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            app:
              - 'app/**'

  server:
    name: server (lint·tsc·test)
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      # @prisma/client 타입이 있어야 tsc/test 가 통과 (DB 연결 불필요)
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  app:
    name: app (format·analyze·test)
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze --fatal-infos
      - run: flutter test

  # 집계 게이트: 항상 실행되며, 실제로 돈 잡이 실패했을 때만 실패한다.
  # 스킵(paths-filter 로 해당 없음)은 통과로 취급 → 이 잡 하나만 required 로 등록.
  ci-gate:
    name: CI Gate
    needs: [changes, server, app]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required code checks
        run: |
          echo "server result: ${{ needs.server.result }}"
          echo "app result:    ${{ needs.app.result }}"
          for r in "${{ needs.server.result }}" "${{ needs.app.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required code check failed."
              exit 1
            fi
          done
          echo "All code checks passed (skipped = ok)."
