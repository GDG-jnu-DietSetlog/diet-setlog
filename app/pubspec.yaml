name: diet_setlog
description: "다이어트/운동 세트 기록 모바일 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

# 버전은 docs/plans/spec-lock.md §10.1 에서 잠금.
dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.5.1
  # 라우팅
  go_router: ^14.2.0
  # HTTP
  dio: ^5.4.0
  # 토큰 저장(secure)
  flutter_secure_storage: ^9.2.0
  # 카카오 로그인(SDK) — 온보딩2. 네이티브/JS 키는 빌드 시 --dart-define 으로 주입.
  kakao_flutter_sdk_user: ^1.9.0
  # 카메라/갤러리
  image_picker: ^1.1.0
  # 이미지 캐시
  cached_network_image: ^3.3.0
  # 불변 모델 + JSON
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # 반응형(designSize 390×844)
  flutter_screenutil: ^5.9.3
  # 날짜/숫자 포맷(KST)
  intl: ^0.19.0
  # 월간 캘린더 그리드
  table_calendar: ^3.1.2
  # iconify 아이콘
  iconify_flutter: ^0.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  # 디바운스/타이머 결정적 테스트(flutter_test 의 transitive 이지만 직접 import 위해 명시)
  fake_async: ^1.3.1
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.8
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
